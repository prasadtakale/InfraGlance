<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">InfraGlance dashboard preview</title>
  <desc id="desc">Static preview of the InfraGlance summary dashboard using fake data.</desc>
  <rect width="1200" height="675" fill="#ffffff"/>
  <rect width="1200" height="92" fill="#0B3C5D"/>
  <rect y="88" width="1200" height="4" fill="#F5B041"/>
  <text x="32" y="42" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">InfraGlance</text>
  <text x="32" y="70" font-family="Arial, sans-serif" font-size="15" fill="#ffffff">Static AWS infrastructure dashboard</text>
  <g font-family="Arial, sans-serif" font-size="15">
