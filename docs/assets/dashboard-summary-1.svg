    <g transform="translate(0 190)">
      <rect width="1136" height="310" rx="6" fill="#ffffff" stroke="#0B3C5D" stroke-opacity=".65"/>
      <rect width="1136" height="42" rx="6" fill="#0B3C5D"/>
      <g fill="#ffffff" font-size="14" font-weight="700">
        <text x="20" y="27">Account</text>
        <text x="240" y="27">EC2 Total</text>
        <text x="390" y="27">Running</text>
        <text x="540" y="27">Monthly Est.</text>
        <text x="720" y="27">RI Coverage</text>
        <text x="930" y="27">Findings</text>
      </g>
      <g font-size="14" fill="#0B3C5D">
        <line x1="0" y1="94" x2="1136" y2="94" stroke="#0B3C5D" stroke-opacity=".25"/>
        <line x1="0" y1="146" x2="1136" y2="146" stroke="#0B3C5D" stroke-opacity=".25"/>
        <text x="20" y="74">Dev and QA</text>
        <text x="260" y="74">2</text>
        <text x="410" y="74">1</text>
        <text x="560" y="74">$7.59</text>
        <text x="750" y="74">100.0%</text>
        <text x="950" y="74">4</text>
        <text x="20" y="126">Stage and Prod</text>
        <text x="260" y="126">2</text>
        <text x="410" y="126">2</text>
        <text x="560" y="126">$85.26</text>
        <text x="750" y="126">50.0%</text>
        <text x="950" y="126">1</text>
