    <g transform="translate(0 66)">
      <g>
        <rect width="170" height="76" rx="6" fill="#ffffff" stroke="#0B3C5D" stroke-opacity=".45"/>
        <rect width="5" height="76" rx="3" fill="#F5B041"/>
        <text x="18" y="30" font-size="16">Accounts</text>
        <text x="18" y="56" font-size="24" font-weight="700">2</text>
      </g>
      <g transform="translate(190 0)">
        <rect width="170" height="76" rx="6" fill="#ffffff" stroke="#0B3C5D" stroke-opacity=".45"/>
        <rect width="5" height="76" rx="3" fill="#F5B041"/>
        <text x="18" y="30" font-size="16">Total EC2</text>
        <text x="18" y="56" font-size="24" font-weight="700">4</text>
      </g>
      <g transform="translate(380 0)">
        <rect width="170" height="76" rx="6" fill="#ffffff" stroke="#0B3C5D" stroke-opacity=".45"/>
        <rect width="5" height="76" rx="3" fill="#F5B041"/>
        <text x="18" y="30" font-size="16">Monthly Est.</text>
        <text x="18" y="56" font-size="24" font-weight="700">$92.85</text>
      </g>
      <g transform="translate(570 0)">
