name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Shell syntax
        run: |
          bash -n infraglance.sh
          bash -n assume_role

      - name: Shellcheck
        run: shellcheck infraglance.sh assume_role

      - name: Python compile
        run: python -m py_compile render_report.py

      - name: Unit tests
        run: python -m unittest discover -s tests
